<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="88" viewBox="0 0 64 88">
  <!-- pole: base tip sits at the viewBox center (32,44), which QGIS uses
       as the marker anchor, so the flag is "planted" at the waypoint -->
  <line x1="32" y1="44" x2="32" y2="8"
        stroke="param(outline) #0f1117" stroke-width="2.4" stroke-linecap="round"/>

  <!-- pennant -->
  <path d="M32,10 L60,19 L32,28 Z"
        fill="param(fill) #22c55e" fill-opacity="0.95"
        stroke="param(outline) #0f1117" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- anchor tip -->
  <circle cx="32" cy="44" r="3"
          fill="param(outline) #0f1117"/>
</svg>
