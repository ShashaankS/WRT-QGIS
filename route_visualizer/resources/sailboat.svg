<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- mast -->
  <line x1="32" y1="50" x2="32" y2="8"
        stroke="param(outline) #0f1117" stroke-width="2.2" stroke-linecap="round"/>

  <!-- main sail (right of mast) -->
  <path d="M32,11 L32,46 L53,46 Z"
        fill="param(fill) #3b82f6" fill-opacity="0.92"
        stroke="param(outline) #0f1117" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- jib sail (left of mast, smaller) -->
  <path d="M32,18 L32,42 L16,42 Z"
        fill="param(fill) #3b82f6" fill-opacity="0.65"
        stroke="param(outline) #0f1117" stroke-width="1" stroke-linejoin="round"/>

  <!-- hull -->
  <path d="M11,50 L53,50 L46,58 L18,58 Z"
        fill="param(fill) #3b82f6"
        stroke="param(outline) #0f1117" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- waterline highlight -->
  <line x1="14" y1="50" x2="50" y2="50"
        stroke="param(outline) #0f1117" stroke-width="0.8" stroke-opacity="0.4"/>
</svg>
