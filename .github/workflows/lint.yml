name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          version: 0.15.22
          args: check --output-format=github

      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          version: 0.15.22
          args: format --check
